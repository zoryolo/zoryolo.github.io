    <link rel="icon" href="/assets/icons/favicon.ico" sizes="any" />
    <link rel="icon" type="image/png" sizes="16x16" href="/assets/icons/favicon-16.png" />
    <link rel="icon" type="image/png" sizes="32x32" href="/assets/icons/favicon-32.png" />

    <script src="/assets/js/loader.js" defer></script>

        <p class="site-loader__text">Preparando tu estancia...</p>
        <div class="site-loader__bar" aria-hidden="true"><span></span></div>
      </div>
    </div>
    <div class="page-wrap">
      <main id="contenido" class="section-padding">
        <div class="container-custom" style="text-align:center; max-width:740px; margin-top:8vh;">

          <p style="margin-top:1rem;">La página que buscas no existe o ha sido movida.</p>
          <div class="cta-buttons" style="margin-top:1.2rem;"><a class="btn btn-primary" href="/">Volver al inicio</a><a class="btn btn-outline" href="/contacto/">Contactar</a></div>
        </div>
      </main>
    </div>
    <script src="/assets/js/app.js" defer></script>
